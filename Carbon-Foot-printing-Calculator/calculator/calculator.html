<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carbon Footprint Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js CDN -->
    <link rel="stylesheet" href="styles.css" />
    <!-- Link to CSS file -->
  </head>
  <style>
    .navbar {
      background: #8a9a5b;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      gap: 20px;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      padding: 10px 15px;
    }
    .navbar a:hover {
      text-decoration: underline;
    }
  </style>
  <body>
    <div class="navbar">
      <a href="/Carbon-Foot-printing-Calculator/home/home.html">Home</a>
      <a href="/Carbon-Foot-printing-Calculator/calculator/calculator.html"
        >Carbon Calculator</a
      >
      <a href="/Carbon-Foot-printing-Calculator/history/history.html"
        >Activity Tracker</a
      >
      <a href="/Carbon-Foot-printing-Calculator/suggestions/suggestion.html"
        >Suggestions</a
      >
      <a href="/Carbon-Foot-printing-Calculator/progress/progress.html"
        >Progress Tracking</a
      >
      <a href="/Carbon-Foot-printing-Calculator/about/about.html"
        >About Carbon Footprint</a
      >
      <a href="/Carbon-Foot-printing-Calculator/profile/viewprofile.html"
        >Profile</a
      >
      <a href="/Carbon-Foot-printing-Calculator/login/login.html">Logout</a>
    </div>
    <div class="container">
      <h1>🌍 Carbon Footprint Calculator</h1>

      <label
        >🚗 Transport (km):
        <input type="number" id="transport" placeholder="Enter distance"
      /></label>
      <label
        >⚡ Electricity (kWh):
        <input type="number" id="electricity" placeholder="Enter usage"
      /></label>
      <label
        >🍔 Food Fuel (kg):
        <input type="number" id="food" placeholder="Enter weight"
      /></label>
      <label
        >🗑 Waste (kg):
        <input type="number" id="waste" placeholder="Enter weight"
      /></label>

      <button onclick="generateReport()">Generate Report</button>

      <h2 id="report"></h2>

      <canvas id="carbonChart"></canvas
      ><!-- Chart will be displayed here -->
    </div>

    <script src="script.js"></script>
    <!-- Link to JavaScript file -->
  </body>
</html>
