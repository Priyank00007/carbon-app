<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carbon Footprint Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js CDN -->
    <link rel="stylesheet" href="../styles.css" />
    <!-- Link to CSS file -->
  </head>
  <style>
    .navbar {
      background: #8a9a5b;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      gap: 20px;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      padding: 10px 15px;
    }
    .navbar a:hover {
      text-decoration: underline;
    }
    .container {
      max-width: 9000px;
      margin: 40px auto;
      padding: 50px;
      background: rgba(245, 245, 220, 0.95);
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      text-align: left;
    }
    label {
      display: block;
      margin: 15px 0;
      font-size: 16px;
    }

    input {
      margin-left: 10px;
      padding: 6px;
      width: 180px;
    }
    button {
      margin-top: 2px;
      padding: 10px 10px;
      background: #8a9a5b;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 60px;
      cursor: pointer;
    }
    button:hover {
      background: #6f7f47;
    }

    canvas {
      margin-top: 30px;
    }
  </style>
  <body>
    <div class="navbar">
      <a href="../home/home.html">Home</a>
      <a href="../calculator/calculator.html">Carbon Calculator</a>
      <a href="../history/history.html">Activity Tracker</a>
      <a href="../suggestions/suggestion.html">Suggestions</a>
      <a href="../progress/progress.html">Progress Tracking</a>
      <a href="../about/about.html">About Carbon Footprint</a>
      <a href="../profile/viewprofile.html">Profile</a>
      <a href="../login/login.html">Logout</a>
    </div>
    <div class="container">
      <h1>🌍 Carbon Footprint Calculator</h1>

      <label
        >🚗 Transport (km):
        <input type="number" id="transport" placeholder="Enter distance"
      /></label>
      <label
        >⚡ Electricity (kWh):
        <input type="number" id="electricity" placeholder="Enter usage"
      /></label>
      <label
        >🍔 Food Fuel (kg):
        <input type="number" id="food" placeholder="Enter weight"
      /></label>
      <label
        >🗑 Waste (kg):
        <input type="number" id="waste" placeholder="Enter weight"
      /></label>

      <button onclick="generateReport()">Generate Report</button>

      <h2 id="report"></h2>

      <canvas id="carbonChart"></canvas
      ><!-- Chart will be displayed here -->
    </div>

    <script src="script.js"></script>
    <!-- Link to JavaScript file -->
  </body>
</html>
