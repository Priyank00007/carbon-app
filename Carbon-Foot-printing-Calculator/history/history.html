    <script>
      // This will be populated by the Node.js server
      const storedUser = JSON.parse(localStorage.getItem("user"));
      const email = storedUser.Email;
      window.onload = async () => {
        try {
          const response = await fetch(`/getTableData?email=${email}`);
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          // Populate the cells with the data
          for (let i = 0; i < data.length; i++) {
            let j = i + 1;
            const cellId = "cell" + j;
            const cell = document.getElementById(cellId);
            if (cell) {
              cell.textContent =
                data[i] !== 0 ? data[i] + " kg" : "Data Not Present";
            }
          }
        } catch (error) {
          console.error("Fetch error:", error);
          // Create a div to display errors if it doesn't exist
          let errorDiv = document.getElementById("error-output");
          if (!errorDiv) {
            errorDiv = document.createElement("div");
            errorDiv.id = "error-output";
            document.body.appendChild(errorDiv);
          }
          errorDiv.textContent = "Error loading data: " + error.message;
        }
      };
    </script>
