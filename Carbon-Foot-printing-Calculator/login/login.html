<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Carbon Footprinting</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h1>Carbon Footprinting</h1>
        <p>
          Measure to Manage, Reduce to Renew. Your Carbon Footprint Starts Here!
        </p>
      </div>
      <div class="right">
        <div class="login-form">
          <h2>Hello Again!</h2>
          <p>Welcome Back</p>
          <input type="email" id="email" placeholder="Email Address" />
          <input type="password" id="password" placeholder="Password" />
          <button id="loginBtn">Login</button>
          <br /><br />
          <a href="../forgetPassword/forgot.html" id="forgotPassword"
            >Forgot Password?</a
          >
          <p>
            Don't have an account?
            <a href="../registration/register.html">Register</a>
          </p>
        </div>
      </div>
    </div>
  </body>
  <script src="../login/login.js"></script>
</html>
